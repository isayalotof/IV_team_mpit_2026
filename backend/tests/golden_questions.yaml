# Golden questions for 3-table schema: anonymized_incity_orders, driver_daily_stats, passenger_daily_stats
# forbidden_keywords: if any appear in generated SQL → FAIL (catches old-schema hallucinations)

golden_questions:
  - question: "Покажи отмены по городам за прошлую неделю"
    expected_tables: [anonymized_incity_orders, cities]
    expected_keywords: [clientcancel_timestamp, drivercancel_timestamp, city_id, "GROUP BY"]
    expected_chart: bar
    forbidden_keywords: ["FROM orders", "FROM payments", "FROM trips", "FROM drivers", "FROM users", "status = 'cancelled'"]

  - question: "Динамика выручки за последние 30 дней"
    expected_tables: [anonymized_incity_orders]
    expected_keywords: [price_order_local, driverdone_timestamp, order_timestamp, "GROUP BY", "DATE_TRUNC"]
    expected_chart: line
    forbidden_keywords: ["FROM payments", "p.amount", "status = 'succeeded'"]

  - question: "Топ 5 городов по числу заказов за месяц"
    expected_tables: [anonymized_incity_orders, cities]
    expected_keywords: [city_id, "COUNT", "GROUP BY", "LIMIT 5"]
    expected_chart: bar
    forbidden_keywords: ["FROM orders", "FROM payments"]

  - question: "Средний чек по городам"
    expected_tables: [anonymized_incity_orders, cities]
    expected_keywords: [price_order_local, "AVG", city_id, "GROUP BY"]
    expected_chart: bar
    forbidden_keywords: ["total_amount", "FROM orders"]

  - question: "Процент отмен по городам за 30 дней"
    expected_tables: [anonymized_incity_orders, cities]
    expected_keywords: [clientcancel_timestamp, drivercancel_timestamp, city_id, "GROUP BY"]
    expected_chart: bar
    forbidden_keywords: ["status = 'cancelled'", "FROM orders"]

  - question: "Сравни заказы этой и прошлой недели"
    expected_tables: [anonymized_incity_orders]
    expected_keywords: ["COUNT", "UNION", order_timestamp, "DATE_TRUNC", week]
    expected_chart: bar
    forbidden_keywords: ["FROM orders", "FROM payments"]

  - question: "Заказы по часам за сегодня"
    expected_tables: [anonymized_incity_orders]
    expected_keywords: ["EXTRACT", "HOUR", order_timestamp, "GROUP BY"]
    expected_chart: bar
    forbidden_keywords: ["FROM orders", "created_at"]

  - question: "Распределение заказов по статусам"
    expected_tables: [anonymized_incity_orders]
    expected_keywords: [status_order, "COUNT", "GROUP BY"]
    expected_chart: bar
    forbidden_keywords: ["FROM orders", "status ="]

  - question: "Средняя длительность поездки по городам"
    expected_tables: [anonymized_incity_orders, cities]
    expected_keywords: [duration_in_seconds, "AVG", city_id, "GROUP BY"]
    expected_chart: bar
    forbidden_keywords: ["FROM trips", "ended_at", "started_at"]

  - question: "Среднее время подачи водителя по городам"
