    expected_keywords: [driverarrived_timestamp, driveraccept_timestamp, "AVG", city_id]
    expected_chart: bar
    forbidden_keywords: ["FROM drivers", "FROM trips"]

  - question: "Топ 10 водителей по выручке за неделю"
