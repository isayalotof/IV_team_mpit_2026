services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: drivee
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TARGET_DB_URL: postgresql+asyncpg://askdata_reader:reader_password@postgres:5432/drivee
      META_DB_URL: sqlite+aiosqlite:///./meta.db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      LLM_PROVIDER: ${LLM_PROVIDER:-gigachat}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-Pro}
      DEMO_MODE: ${DEMO_MODE:-1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      FRONTEND_URL: http://localhost:5173
    volumes:
      - backend_data:/app/meta_data
      - ./backend/config:/app/config
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
